<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de site gratuit — Zymlux Création</title>
<meta name="description" content="Créez votre site web en direct, gratuitement. Nom, métier, couleur — votre site apparaît instantanément.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#070708;--bg2:#0d0d12;--card:#13131b;--line:#222230;--txt:#f4f4f6;--mut:#9a9aac;--c1:#7b5cff;--c2:#19e3c0;--grad:linear-gradient(120deg,#7b5cff,#19e3c0);--ease:cubic-bezier(.22,1,.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;line-height:1.5;height:100vh;overflow:hidden}
a{color:inherit;text-decoration:none}
h1,h2,h3,.dsp{font-family:'Space Grotesk',sans-serif}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--grad);color:#06060a;font-weight:600;padding:13px 22px;border-radius:50px;border:0;cursor:pointer;font-size:.92rem;transition:.3s var(--ease);font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(123,92,255,.4)}
.btn-out{background:transparent;border:1px solid var(--line);color:var(--txt)}
.btn-out:hover{border-color:#fff}
/* top bar */
.top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line);background:rgba(7,7,8,.8);backdrop-filter:blur(10px)}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--grad)}
.top .pill{font-size:.72rem;color:var(--c2);border:1px solid var(--line);padding:5px 12px;border-radius:50px}
/* layout */
.app{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 64px)}
.controls{border-right:1px solid var(--line);padding:24px;overflow-y:auto;background:var(--bg2)}
.controls h1{font-size:1.4rem;margin-bottom:4px}
.controls .sub{color:var(--mut);font-size:.85rem;margin-bottom:22px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:8px;font-weight:600}
.field input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:12px 14px;border-radius:10px;font-family:inherit;font-size:.92rem;transition:.3s}
.field input:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(123,92,255,.16)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:inherit;font-size:.8rem;color:var(--mut);background:var(--card);border:1px solid var(--line);padding:8px 12px;border-radius:50px;cursor:pointer;transition:.25s}
.chip:hover{color:var(--txt);border-color:var(--c1)}
.chip.active{color:#06060a;background:var(--grad);border-color:transparent;font-weight:600}
.swatches{display:flex;gap:9px;flex-wrap:wrap}
.sw{width:30px;height:30px;border-radius:50%;background:var(--s);border:2px solid transparent;cursor:pointer;transition:.2s;padding:0}
.sw:hover{transform:scale(1.12)}
.sw.active{border-color:#fff;box-shadow:0 0 0 2px var(--s)}
.cpick{width:46px;height:30px;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer;padding:2px}
.upload{display:block;background:var(--card);border:1px dashed var(--line);color:var(--mut);padding:13px;border-radius:10px;text-align:center;cursor:pointer;font-size:.85rem;transition:.25s}
.upload:hover{border-color:var(--c1);color:var(--txt)}
.toggle{display:flex;gap:7px}
.toggle button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--mut);padding:9px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:.25s}
.toggle button.active{color:#06060a;background:var(--grad);border-color:transparent;font-weight:600}
.cta-box{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.cta-box .btn{width:100%}
.cta-row{display:flex;gap:8px;margin-top:9px}
.cta-row .btn{flex:1;padding:11px;font-size:.85rem}
.cta-box p{text-align:center;color:var(--mut);font-size:.76rem;margin-top:10px;transition:.2s}
/* preview */
.preview{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:16px;background:radial-gradient(80% 80% at 50% 0,rgba(123,92,255,.08),transparent 60%)}
.device{width:100%;max-width:900px;height:100%;max-height:calc(100vh - 150px);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#0a0a0e;box-shadow:0 30px 90px rgba(0,0,0,.55);display:flex;flex-direction:column}
.device .bar{height:40px;display:flex;align-items:center;gap:7px;padding:0 16px;background:#13131b;border-bottom:1px solid var(--line);flex:0 0 auto}
.device .bar i{width:11px;height:11px;border-radius:50%;background:#3a3a46}
.device .bar .url{margin-left:12px;font-size:.74rem;color:var(--mut);background:#0a0a0e;padding:4px 12px;border-radius:6px}
.device iframe{flex:1;width:100%;border:0;background:#fff}
.preview .hint{color:var(--mut);font-size:.8rem;display:flex;align-items:center;gap:8px}
.preview .hint .live{width:7px;height:7px;border-radius:50%;background:#21d07a;box-shadow:0 0 8px #21d07a;animation:p 1.5s infinite}
@keyframes p{50%{opacity:.4}}
@media(max-width:880px){
  body{overflow:auto;height:auto}
  .app{grid-template-columns:1fr;height:auto}
  .controls{border-right:0;border-bottom:1px solid var(--line);overflow:visible}
  .preview{padding:18px}
  .device{height:560px;max-height:none}
}
</style>
</head>
<body>
<div class="top">
  <a href="../" class="brand"><span class="dot"></span>Zymlux <span class="grad">Création</span></a>
  <span class="pill">⚡ Générateur en direct</span>
  <a href="../#contact" class="btn" style="padding:9px 18px">Être rappelé</a>
</div>

<div class="app">
  <aside class="controls">
    <h1>Crée ton site <span class="grad">en direct</span></h1>
    <p class="sub">Remplis, regarde ton site se construire à droite. Gratuit, instantané.</p>
    <button id="surprise" class="btn" type="button" style="width:100%;margin-bottom:18px">🎲 Surprends-moi</button>

    <div class="field">
      <label>Nom du commerce</label>
      <input id="f-name" type="text" maxlength="26" value="Chez Marco" placeholder="Ex : Salon Élégance">
    </div>
    <div class="field">
      <label>Slogan (optionnel)</label>
      <input id="f-slogan" type="text" maxlength="48" placeholder="Laissez vide = slogan auto">
    </div>
    <div class="field">
      <label>Métier</label>
      <div class="chips" id="f-type"></div>
    </div>
    <div class="field">
      <label>Couleur</label>
      <div class="swatches" id="f-color"></div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:9px">
        <input type="color" id="f-custom" class="cpick" value="#7b5cff" title="Couleur personnalisée">
        <span style="font-size:.78rem;color:var(--mut)">ou ta couleur exacte</span>
      </div>
    </div>
    <div class="field">
      <label>Style</label>
      <div class="chips" id="f-style"></div>
    </div>
    <div class="field">
      <label>Thème</label>
      <div class="toggle" id="f-theme">
        <button data-t="dark" class="active">Sombre</button>
        <button data-t="light">Clair</button>
      </div>
    </div>
    <div class="field">
      <label>Ville</label>
      <input id="f-city" type="text" maxlength="24" value="Lille" placeholder="Votre ville">
    </div>
    <div class="field">
      <label>Téléphone</label>
      <input id="f-phone" type="text" maxlength="20" value="06 12 34 56 78" placeholder="Votre numéro">
    </div>
    <div class="field">
      <label>Votre photo (vitrine / logo)</label>
      <label class="upload" for="f-photo">📷 Choisir une image</label>
      <input type="file" accept="image/*" id="f-photo" hidden>
    </div>

    <div class="cta-box">
      <a id="claim" class="btn" href="../#contact">J'adore — je veux ce site →</a>
      <div class="cta-row">
        <button id="dl" class="btn btn-out" type="button">⬇ Télécharger</button>
        <button id="share" class="btn btn-out" type="button">🔗 Partager</button>
      </div>
      <p id="cta-note">On le met en ligne, à votre nom, sous 7 jours.</p>
    </div>
  </aside>

  <section class="preview">
    <div class="device">
      <div class="bar"><i></i><i></i><i></i><span class="url" id="d-url">🔒 chez-marco.fr</span></div>
      <iframe id="d-frame" title="Aperçu de votre site"></iframe>
    </div>
    <div class="hint"><span class="live"></span> Aperçu mis à jour en temps réel</div>
  </section>
</div>

<script>
(function(){
  var TYPES=[
    {k:'Barbier',emoji:'🪒',eyebrow:'Barbier · Salon',slogan:"L'art de la coupe, sur-mesure.",cta:'Réserver',serv:[['Coupe signature','Shampoing + coiffage'],['Taille de barbe','Au cordeau'],['Rasage traditionnel','Serviette chaude']]},
    {k:'Beauté',emoji:'💅',eyebrow:'Institut · Beauté',slogan:'Sublimez votre beauté, en douceur.',cta:'Prendre RDV',serv:[['Soins du visage','Éclat & hydratation'],['Pose & nail art','Mains de rêve'],['Épilation','Précise & soignée']]},
    {k:'Restaurant',emoji:'🍽️',eyebrow:'Restaurant',slogan:'Une cuisine qui a du goût.',cta:'Réserver une table',serv:[['Entrées','De saison'],['Plats signature','Faits maison'],['Desserts','Gourmands']]},
    {k:'Artisan',emoji:'🔧',eyebrow:'Artisan · Dépannage',slogan:'Un travail soigné, garanti.',cta:'Devis gratuit',serv:[['Dépannage','Intervention rapide'],['Installation','Aux normes'],['Rénovation','Clé en main']]},
    {k:'Coach',emoji:'💪',eyebrow:'Coach · Sport',slogan:'Dépassez vos limites.',cta:'Séance d’essai',serv:[['Coaching perso','Programme sur-mesure'],['Cours collectifs','Énergie de groupe'],['Nutrition','Plan adapté']]},
    {k:'Fleuriste',emoji:'🌸',eyebrow:'Atelier floral',slogan:'La beauté, au naturel.',cta:'Commander',serv:[['Bouquets','Compositions du jour'],['Mariages','Décoration florale'],['Abonnements','Fleurs chaque semaine']]},
    {k:'Café',emoji:'☕',eyebrow:'Café · Salon de thé',slogan:'Le bon café, simplement.',cta:'Voir la carte',serv:[['Cafés','Torréfaction maison'],['Pâtisseries','Faites maison'],['Brunch','Tous les week-ends']]},
    {k:'Tatoueur',emoji:'🖋️',eyebrow:'Studio de tatouage',slogan:"L'encre qui vous ressemble.",cta:'Prendre RDV',serv:[['Flash','Modèles dispo'],['Sur-mesure','Votre projet'],['Cover-up','On rattrape tout']]},
    {k:'Photographe',emoji:'📸',eyebrow:'Studio photo',slogan:'Vos instants, sublimés.',cta:'Réserver une séance',serv:[['Portrait','Studio ou extérieur'],['Mariage','Le grand jour'],['Entreprise','Image pro']]},
    {k:'Garage',emoji:'🚗',eyebrow:'Garage · Auto',slogan:'Votre voiture entre de bonnes mains.',cta:'Prendre RDV',serv:[['Entretien','Révision complète'],['Réparation','Toutes marques'],['Pneus','Montage rapide']]},
    {k:'Immobilier',emoji:'🏠',eyebrow:'Agence immobilière',slogan:'Le bien de vos rêves vous attend.',cta:'Estimer mon bien',serv:[['Achat','Biens sélectionnés'],['Vente','Estimation gratuite'],['Location','Accompagnement']]},
    {k:'Dentiste',emoji:'🦷',eyebrow:'Cabinet dentaire',slogan:'Votre sourire, notre priorité.',cta:'Prendre RDV',serv:[['Soins','Caries & détartrage'],['Esthétique','Blanchiment'],['Implants','Solutions durables']]}
  ];
  var COLORS=['#7b5cff','#19e3c0','#ff5fa2','#f4a300','#e3261f','#2e8bff','#16c172'];
  var STYLES=[
    {k:'Moderne',font:'Space Grotesk',w:'600;700',h1:'50px',tt:'none',it:false},
    {k:'Élégant',font:'Fraunces',w:'500;600',h1:'54px',tt:'none',it:true},
    {k:'Audacieux',font:'Anton',w:'',h1:'70px',tt:'uppercase',it:false}
  ];
  var st={name:'Chez Marco',slogan:'',type:0,color:'#7b5cff',style:0,theme:'dark',city:'Lille',phone:'06 12 34 56 78',photo:''};
  // restaurer depuis l'URL (sites partagés)
  try{var q=new URLSearchParams(location.search);
    if(q.get('n'))st.name=q.get('n');
    if(q.get('s'))st.slogan=q.get('s');
    if(q.get('t')!=null)st.type=Math.max(0,Math.min(TYPES.length-1,parseInt(q.get('t'),10)||0));
    if(q.get('ly')!=null)st.style=Math.max(0,Math.min(2,parseInt(q.get('ly'),10)||0));
    if(q.get('c'))st.color='#'+q.get('c').replace('#','');
    if(q.get('th'))st.theme=q.get('th')==='light'?'light':'dark';
    if(q.get('city'))st.city=q.get('city');
    if(q.get('p'))st.phone=q.get('p');
  }catch(e){}

  function esc(s){return String(s||'').replace(/[<>&"]/g,function(c){return({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]})}
  function slug(s){return (s||'site').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'site'}

  function build(){
    var d=TYPES[st.type],c=st.color,nm=esc(st.name||'Votre Commerce');
    var slog=esc(st.slogan||d.slogan);
    var S=STYLES[st.style]||STYLES[0];
    var ff=S.font, fam=(ff==='Anton'?'Anton':ff.replace(/ /g,'+')+':wght@'+S.w);
    var ini=(st.name||'S').replace(/[^A-Za-zÀ-ÿ ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w.charAt(0)}).join('').toUpperCase()||'S';
    var dark=st.theme==='dark';
    var bg=dark?'#0e0e13':'#ffffff', tx=dark?'#f3f3f7':'#16161d', mut=dark?'#9a9aac':'#6a6a78', card=dark?'#17171f':'#f5f6f8', line=dark?'#23232f':'#e9e9f0';
    var serv=d.serv.map(function(s){return '<div class=sc><div class=ic></div><h3>'+esc(s[0])+'</h3><p>'+esc(s[1])+'</p></div>'}).join('');
    var pv=st.photo?('background-image:url('+st.photo+');background-size:cover;background-position:center'):('background:linear-gradient(135deg,'+c+'55,'+card+')');
    var revs='<div class=rv><div class=stx>★★★★★</div><p>« Service au top, je recommande à 100%. »</p><b>— Julie</b></div><div class=rv><div class=stx>★★★★★</div><p>« Accueil parfait et résultat impeccable. »</p><b>— Marc</b></div><div class=rv><div class=stx>★★★★★</div><p>« Réservation hyper simple, que du bonheur. »</p><b>— Sofia</b></div>';
    var steps='<div class=stp><span>1</span><h4>Vous réservez</h4><p>En ligne, en 30 secondes.</p></div><div class=stp><span>2</span><h4>On s\'occupe de tout</h4><p>Avec soin et savoir-faire.</p></div><div class=stp><span>3</span><h4>Vous repartez ravi</h4><p>Et vous revenez !</p></div>';
    return '<!doctype html><html lang=fr><head><meta charset=utf8><meta name=viewport content="width=device-width,initial-scale=1">'+
    '<link href="https://fonts.googleapis.com/css2?family='+fam+'&family=Inter:wght@400;500&display=swap" rel=stylesheet>'+
    '<style>*{margin:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:Inter,sans-serif;background:'+bg+';color:'+tx+'}'+
    'h1,h2,h3,.lg{font-family:"'+ff+'",sans-serif}a{color:inherit;text-decoration:none}'+
    '.cta{background:'+c+';color:#fff;font-weight:600;border:0;padding:12px 22px;border-radius:50px;font-size:14px;display:inline-block;cursor:pointer}'+
    '.ghost{border:1px solid '+line+';color:'+tx+';padding:12px 22px;border-radius:50px;font-size:14px;cursor:pointer;background:none}'+
    '.wrap{max-width:1000px;margin:0 auto;padding:0 26px}'+
    'header{position:sticky;top:0;z-index:9;display:flex;align-items:center;justify-content:space-between;padding:14px 26px;background:'+bg+'ee;backdrop-filter:blur(8px);border-bottom:1px solid '+line+'}'+
    '.lo{font-family:"'+ff+'";font-weight:700;font-size:18px;display:flex;gap:9px;align-items:center}.lo .mono{width:30px;height:30px;border-radius:9px;background:'+c+';color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}'+
    'nav{display:flex;gap:5px}nav button{background:none;border:0;color:'+mut+';font-family:inherit;font-size:13px;cursor:pointer;padding:7px 13px;border-radius:50px;transition:.2s}nav button:hover{color:'+tx+'}nav button.act{color:#fff;background:'+c+'}'+
    '.page{display:none}.page.on{display:block;animation:fp .5s ease}@keyframes fp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}'+
    '.hero{position:relative;padding:60px 0 48px;overflow:hidden}'+
    '.glow{position:absolute;width:340px;height:340px;border-radius:50%;background:'+c+';filter:blur(110px);opacity:.22;top:-80px;right:-60px}'+
    '.eb{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:'+c+';font-weight:600}'+
    '.hero h1{font-size:'+S.h1+';line-height:1.03;margin:14px 0 16px;max-width:680px;text-transform:'+S.tt+';font-style:'+(S.it?'italic':'normal')+'}'+
    '.hero p{color:'+mut+';font-size:17px;max-width:440px;margin-bottom:24px}'+
    '.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}'+
    '.stat{display:flex;gap:34px;margin-top:32px}.stat b{font-family:"'+ff+'";font-size:26px;color:'+c+';display:block}.stat span{font-size:12px;color:'+mut+'}'+
    '.hgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center}.hvis{aspect-ratio:4/3;border-radius:18px;border:1px solid '+line+'}'+
    '.revs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.rv{background:'+card+';border:1px solid '+line+';border-radius:14px;padding:18px}.rv .stx{color:'+c+';font-size:13px;margin-bottom:8px}.rv p{font-size:13px;color:'+mut+'}.rv b{display:block;margin-top:10px;font-size:12px}'+
    '.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}.stp{background:'+card+';border:1px solid '+line+';border-radius:14px;padding:20px}.stp span{display:inline-flex;width:30px;height:30px;border-radius:50%;background:'+c+';color:#fff;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-bottom:10px}.stp h4{font-size:15px;margin-bottom:4px}.stp p{font-size:12px;color:'+mut+'}'+
    'section.s{padding:48px 0}'+
    '.h2{font-size:30px;margin-bottom:8px}.lead{color:'+mut+';margin-bottom:26px;font-size:15px;max-width:520px}'+
    '.serv{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}'+
    '.sc{background:'+card+';border:1px solid '+line+';border-radius:16px;padding:22px}'+
    '.sc .ic{width:42px;height:42px;border-radius:12px;background:'+c+';opacity:.9;margin-bottom:12px}'+
    '.sc h3{font-size:17px;margin-bottom:5px}.sc p{color:'+mut+';font-size:13px}.sc .pr{color:'+c+';font-weight:700;margin-top:10px;display:block;font-family:"'+ff+'"}'+
    '.about{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center}'+
    '.about .pic{aspect-ratio:4/3;border-radius:16px;background:linear-gradient(135deg,'+c+'55,'+card+')}'+
    '.vals{list-style:none;margin:16px 0 22px;display:flex;flex-direction:column;gap:9px}.vals li{color:'+mut+';font-size:14px;padding-left:18px;position:relative}.vals li:before{content:"✦";position:absolute;left:0;color:'+c+'}'+
    '.contact{display:grid;grid-template-columns:1fr 1fr;gap:22px}.ci{background:'+card+';border:1px solid '+line+';border-radius:16px;padding:24px}.ci h3{font-size:16px;margin-bottom:12px}.ci p{color:'+mut+';font-size:14px;margin-bottom:8px}'+
    '.fl{display:flex;flex-direction:column;gap:10px}.fl input,.fl textarea{background:'+bg+';border:1px solid '+line+';color:'+tx+';padding:11px;border-radius:10px;font-family:inherit;font-size:13px}'+
    '.band{text-align:center;background:'+card+';border:1px solid '+line+';border-radius:20px;padding:38px;margin-top:34px}.band h2{font-size:26px;margin-bottom:8px}.band p{color:'+mut+';margin-bottom:16px}'+
    'footer{padding:26px;border-top:1px solid '+line+';color:'+mut+';font-size:12px;text-align:center}'+
    '@media(max-width:720px){.hero h1{font-size:34px}.serv,.about,.contact,.hgrid,.revs,.steps{grid-template-columns:1fr}nav{display:none}.stat{gap:22px}.hvis{display:none}}'+
    '</style></head><body>'+
    '<header><div class=lo><span class=mono>'+esc(ini)+'</span>'+nm+'</div>'+
    '<nav><button data-p=home class=act>Accueil</button><button data-p=services>Services</button><button data-p=about>À propos</button><button data-p=contact>Contact</button></nav>'+
    '<a class=cta data-go=contact>'+esc(d.cta)+'</a></header>'+
    // PAGE ACCUEIL
    '<main class=page id=p-home>'+
    '<div class=hero><div class=wrap><div class=glow></div><div class=hgrid><div>'+
    '<div class=eb>'+esc(d.eyebrow)+' · '+esc(st.city)+'</div>'+
    '<h1>'+slog+'</h1>'+
    '<p>Bienvenue chez <b>'+nm+'</b>. Réservez en ligne en quelques secondes, 7j/7.</p>'+
    '<div class=row><a class=cta data-go=contact>'+esc(d.cta)+' &rarr;</a><a class=ghost data-go=services>Voir nos services</a></div>'+
    '<div class=stat><div><b>4,9/5</b><span>+200 avis</span></div><div><b>7j/7</b><span>disponible</span></div><div><b>'+esc(st.city)+'</b><span>& alentours</span></div></div>'+
    '</div><div class=hvis style="'+pv+'"></div></div>'+
    '</div></div>'+
    '<section class=s><div class=wrap><div class=eb>Aperçu</div><div class=h2>Nos prestations</div><div class=serv>'+serv+'</div></div></section>'+
    '<section class=s><div class=wrap><div class=eb>Avis clients</div><div class=h2>Ils nous recommandent</div><div class=revs>'+revs+'</div></div></section>'+
    '</main>'+
    // PAGE SERVICES
    '<main class=page id=p-services>'+
    '<section class=s><div class=wrap><div class=eb>Services</div><div class=h2>Ce que nous faisons pour vous</div><p class=lead>Des prestations soignées, réalisées avec passion et savoir-faire.</p><div class=serv>'+serv+'</div>'+
    '<div style="margin-top:40px"><div class=eb>Comment ça marche</div><div class=h2>Simple comme bonjour</div><div class=steps>'+steps+'</div></div>'+
    '<div class=band><h2>Prêt à réserver ?</h2><p>Réservation en ligne, 7j/7, en quelques secondes.</p><a class=cta data-go=contact>'+esc(d.cta)+' &rarr;</a></div>'+
    '</div></section></main>'+
    // PAGE A PROPOS
    '<main class=page id=p-about>'+
    '<section class=s><div class=wrap><div class=about><div class=pic style="'+pv+'"></div><div><div class=eb>À propos</div><div class=h2>'+nm+', votre adresse de confiance</div><p class=lead>Une équipe passionnée, un accueil chaleureux et un vrai savoir-faire. Venez vivre l’expérience '+nm+'.</p><ul class=vals><li>Savoir-faire reconnu</li><li>Accueil chaleureux & sur-mesure</li><li>Produits et matériel de qualité</li></ul><a class=cta data-go=contact>'+esc(d.cta)+' &rarr;</a></div></div>'+
    '<div class=stat><div><b>+10 ans</b><span>d’expérience</span></div><div><b>+2000</b><span>clients satisfaits</span></div><div><b>4,9/5</b><span>note moyenne</span></div></div>'+
    '</div></section></main>'+
    // PAGE CONTACT
    '<main class=page id=p-contact>'+
    '<section class=s><div class=wrap><div class=eb>Contact</div><div class=h2>On vous attend</div><div class=contact>'+
    '<div class=ci><h3>Coordonnées</h3><p>📍 '+esc(st.city)+'</p><p>📞 '+esc(st.phone)+'</p><p>🕒 Lun–Sam · 9h–19h</p><br><a class=cta data-go=contact>'+esc(d.cta)+' &rarr;</a></div>'+
    '<div class=ci><h3>Écrivez-nous</h3><div class=fl><input placeholder="Votre nom"><input placeholder="Téléphone"><textarea rows=3 placeholder="Votre message"></textarea><a class=cta>Envoyer</a></div></div>'+
    '</div></div></section></main>'+
    '<footer>© 2026 '+nm+' — '+esc(st.city)+' · Site créé avec Zymlux Création</footer>'+
    '<script>(function(){var P=["home","services","about","contact"],i=0,t=false;function go(id){var x=P.indexOf(id);if(x<0)x=0;i=x;var ps=document.querySelectorAll(".page");for(var k=0;k<ps.length;k++)ps[k].classList.toggle("on",ps[k].id==="p-"+id);var nb=document.querySelectorAll("nav button");for(var j=0;j<nb.length;j++)nb[j].classList.toggle("act",nb[j].getAttribute("data-p")===id);window.scrollTo(0,0)}var cl=document.querySelectorAll("[data-p],[data-go]");for(var a=0;a<cl.length;a++){cl[a].addEventListener("click",function(){t=true;go(this.getAttribute("data-p")||this.getAttribute("data-go"))})}go("home");setInterval(function(){if(t)return;i=(i+1)%P.length;go(P[i])},3600)})();<\/script>'+
    '</body></html>';
  }

  var frame=document.getElementById('d-frame'),url=document.getElementById('d-url'),claim=document.getElementById('claim');
  var T;
  function render(){
    frame.srcdoc=build();
    url.textContent='🔒 '+slug(st.name)+'.fr';
    if(claim)claim.href='../#contact';
  }
  function debounced(){clearTimeout(T);T=setTimeout(render,260)}

  // build type chips
  var typeWrap=document.getElementById('f-type');
  TYPES.forEach(function(t,i){var b=document.createElement('button');b.className='chip'+(i===st.type?' active':'');b.type='button';b.textContent=t.emoji+' '+t.k;
    b.addEventListener('click',function(){st.type=i;[].forEach.call(typeWrap.children,function(c,k){c.classList.toggle('active',k===i)});render()});typeWrap.appendChild(b)});
  // styles
  var styleWrap=document.getElementById('f-style');
  STYLES.forEach(function(s,i){var b=document.createElement('button');b.className='chip'+(i===st.style?' active':'');b.type='button';b.textContent=s.k;
    b.addEventListener('click',function(){st.style=i;[].forEach.call(styleWrap.children,function(c,k){c.classList.toggle('active',k===i)});render()});styleWrap.appendChild(b)});
  // colors
  var colWrap=document.getElementById('f-color');
  COLORS.forEach(function(col,i){var b=document.createElement('button');b.className='sw'+(col===st.color?' active':'');b.type='button';b.style.setProperty('--s',col);b.dataset.c=col;
    b.addEventListener('click',function(){st.color=col;[].forEach.call(colWrap.children,function(c){c.classList.toggle('active',c.dataset.c===col)});render()});colWrap.appendChild(b)});
  // theme
  var themeWrap=document.getElementById('f-theme');
  [].forEach.call(themeWrap.children,function(btn){btn.addEventListener('click',function(){st.theme=btn.dataset.t;[].forEach.call(themeWrap.children,function(c){c.classList.toggle('active',c===btn)});render()})});
  // text inputs
  document.getElementById('f-name').addEventListener('input',function(e){st.name=e.target.value;debounced()});
  document.getElementById('f-slogan').addEventListener('input',function(e){st.slogan=e.target.value;debounced()});
  document.getElementById('f-city').addEventListener('input',function(e){st.city=e.target.value;debounced()});
  document.getElementById('f-phone').addEventListener('input',function(e){st.phone=e.target.value;debounced()});

  // appliquer l'état restauré aux champs + thème
  document.getElementById('f-name').value=st.name;
  document.getElementById('f-slogan').value=st.slogan;
  document.getElementById('f-city').value=st.city;
  document.getElementById('f-phone').value=st.phone;
  [].forEach.call(themeWrap.children,function(c){c.classList.toggle('active',c.dataset.t===st.theme)});

  // upload photo
  var photoInput=document.getElementById('f-photo');
  if(photoInput)photoInput.addEventListener('change',function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){st.photo=r.result;render();var up=document.querySelector('.upload');if(up)up.textContent='✅ Image ajoutée — changer'};r.readAsDataURL(f)});
  // couleur personnalisée
  var cust=document.getElementById('f-custom');
  if(cust){cust.value=st.color;cust.addEventListener('input',function(){st.color=cust.value;[].forEach.call(colWrap.children,function(c){c.classList.remove('active')});render()})}
  // 🎲 surprends-moi
  var NAMES=['Chez Léa','Studio Onze','La Maison','Atelier Nord','Le Refuge','Côté Sud','Maison Belle','Vesper','L’Atelier','Nova','Le Cercle','Brume'];
  function rnd(a){return a[Math.floor(Math.random()*a.length)]}
  var surprise=document.getElementById('surprise');
  if(surprise)surprise.addEventListener('click',function(){
    st.name=rnd(NAMES);st.slogan='';st.type=Math.floor(Math.random()*TYPES.length);st.style=Math.floor(Math.random()*STYLES.length);st.color=rnd(COLORS);st.theme=Math.random()<0.5?'dark':'light';
    document.getElementById('f-name').value=st.name;document.getElementById('f-slogan').value='';
    [].forEach.call(typeWrap.children,function(c,k){c.classList.toggle('active',k===st.type)});
    [].forEach.call(styleWrap.children,function(c,k){c.classList.toggle('active',k===st.style)});
    [].forEach.call(colWrap.children,function(c){c.classList.toggle('active',c.dataset.c===st.color)});
    [].forEach.call(themeWrap.children,function(c){c.classList.toggle('active',c.dataset.t===st.theme)});
    if(cust)cust.value=st.color;
    render();
  });
  function note(t){var n=document.getElementById('cta-note');if(!n)return;clearTimeout(n._t);var o=n.dataset.o||(n.dataset.o=n.textContent);n.textContent=t;n._t=setTimeout(function(){n.textContent=o},2400)}
  function shareURL(){var p=new URLSearchParams();p.set('n',st.name);if(st.slogan)p.set('s',st.slogan);p.set('t',st.type);p.set('ly',st.style);p.set('c',st.color.replace('#',''));p.set('th',st.theme);p.set('city',st.city);p.set('p',st.phone);return location.origin+location.pathname+'?'+p.toString()}
  // télécharger le vrai fichier HTML
  document.getElementById('dl').addEventListener('click',function(){
    var blob=new Blob([build()],{type:'text/html;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=slug(st.name)+'.html';
    document.body.appendChild(a);a.click();setTimeout(function(){a.remove();URL.revokeObjectURL(a.href)},100);
    note('✅ Votre site est téléchargé !');
  });
  // partager via lien
  document.getElementById('share').addEventListener('click',function(){
    var u=shareURL();
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(u).then(function(){note('🔗 Lien copié — partagez-le !')},function(){window.prompt('Copiez votre lien :',u)})}
    else{window.prompt('Copiez votre lien :',u)}
  });

  render();
})();
</script>
</body>
</html>
